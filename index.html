<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>AI + Timer</title>

<link rel="icon" href="data:,">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#eef2ff;
padding:20px;
}

h1{
color:#1e40ff;
}

canvas{
border:3px solid black;
margin-top:20px;
}

#result{
font-size:40px;
margin-top:20px;
font-weight:bold;
}

#timerDisplay{
font-size:40px;
margin-top:10px;
color:red;
font-weight:bold;
}

input{
padding:10px;
font-size:16px;
margin-top:10px;
}

button{
font-size:16px;
padding:10px 20px;
margin:8px;
border:none;
border-radius:8px;
background:#1e40ff;
color:white;
cursor:pointer;
}

button:hover{
background:#0f2bd6;
}

</style>

</head>

<body>

<h1>AI ตรวจจับท่าทาง/h1>

<!-- ปุ่มกล้อง -->
<button onclick="init()">Start Camera</button>
<button onclick="stopCamera()">Stop Camera</button>

<br>

<canvas id="canvas"></canvas>

<div id="result">AI ยังไม่เริ่ม</div>

<hr>

<!-- TIMER -->
<h2>นาฬิกานับถอยหลัง</h2>

<input type="number" id="timeInput" placeholder="ใส่วินาที เช่น 30">

<br>

<button onclick="startTimer()">Start Timer</button>
<button onclick="stopTimer()">Stop Timer</button>

<div id="timerDisplay">0</div>

<hr>

<!-- ปุ่มกลับเว็บ -->
<button onclick="goHome()">กลับไปหน้าเว็บไซต์</button>

<script>

const URL = "https://teachablemachine.withgoogle.com/models/e-gQIohsI/";

let model, webcam, ctx;
let running = false;

// ================= AI =================

async function init(){

const modelURL = URL + "model.json";
const metadataURL = URL + "metadata.json";

model = await tmPose.load(modelURL, metadataURL);

const size = 400;
const flip = true;

webcam = new tmPose.Webcam(size,size,flip);

await webcam.setup();
await webcam.play();

running = true;

window.requestAnimationFrame(loop);

const canvas = document.getElementById("canvas");
canvas.width = size;
canvas.height = size;

ctx = canvas.getContext("2d");

}

function stopCamera(){

running = false;

if(webcam){
webcam.stop();
}

document.getElementById("result").innerHTML = "Camera stopped";

}

async function loop(){

if(!running) return;

webcam.update();
await predict();

window.requestAnimationFrame(loop);

}

async function predict(){

const {pose,posenetOutput} = await model.estimatePose(webcam.canvas);
const prediction = await model.predict(posenetOutput);

let best = prediction[0];

for(let i=0;i<prediction.length;i++){
if(prediction[i].probability > best.probability){
best = prediction[i];
}
}

document.getElementById("result").innerHTML =
best.className + " " + (best.probability*100).toFixed(0) + "%";

drawPose(pose);

}

function drawPose(pose){

ctx.drawImage(webcam.canvas,0,0);

if(pose){
tmPose.drawKeypoints(pose.keypoints,0.5,ctx);
tmPose.drawSkeleton(pose.keypoints,0.5,ctx);
}

}

// ================= TIMER =================

let timer;
let timeLeft = 0;

function startTimer(){

timeLeft = document.getElementById("timeInput").value;

if(timeLeft <= 0){
alert("กรุณาใส่เวลา");
return;
}

clearInterval(timer);

timer = setInterval(()=>{

timeLeft--;

document.getElementById("timerDisplay").innerHTML =
timeLeft + " วินาที";

if(timeLeft <= 0){

clearInterval(timer);
document.getElementById("timerDisplay").innerHTML = "หมดเวลา!";
alert("หมดเวลาแล้ว!");

}

},1000);

}

function stopTimer(){

clearInterval(timer);

}

// ================= GO HOME =================

function goHome(){

window.location.href="https://arobic-orange68.my.canva.site/daheh3sh7p0?fbclid=PARlRTSAQnZv5leHRuA2FlbQIxMABzcnRjBmFwcF9pZA8xMjQwMjQ1NzQyODc0MTQAAacWrrllwOiejd-VB_56aPOnDpPlp9RTm-U-8Tod6QOFY40W6_6MKWYM5RREnA_aem_k1YoSEt6M6R9Jsiu4cyoQw";

}

</script>

</body>
</html>
